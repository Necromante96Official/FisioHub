<section class="fh-panel-wrap">
  <article class="fh-panel" aria-live="polite">
    <div class="fh-panel-headline">
      <h2>Dados importados</h2>
      <p class="fh-subtitle">Edite diretamente os dados importados neste bloco de notas.</p>
    </div>

    <div class="fh-panel-body">
      <textarea id="importedDataEditor" class="fh-data-editor" spellcheck="false"
        aria-label="Editor dos dados importados" placeholder="Nenhum dado importado ainda."></textarea>
    </div>
  </article>

  <div class="fh-panel-actions">
    <div class="fh-panel-actions-left">
      <button id="backupsBtn" class="fh-btn fh-btn-success" type="button" data-hover-description="Abre as opções de backup e restauração.">Backups</button>
      <button id="clearAllDataBtn" class="fh-btn fh-btn-ghost" type="button" data-hover-description="Limpa todos os dados das páginas, mantendo a Lista de Pacientes intacta.">Limpar Dados</button>
    </div>

    <div class="fh-panel-actions-right">
      <button id="importBtn" class="fh-btn fh-btn-primary" type="button">Importar dados</button>
      <button id="processBtn" class="fh-btn" type="button">Processar</button>
      <button id="clearDataBtn" class="fh-btn fh-btn-danger" type="button">Limpar Texto</button>
    </div>
    <input id="importFileInput" type="file" accept=".txt,.json" hidden>
  </div>

  <dialog id="backupsDialog" class="fh-backups-dialog" aria-labelledby="backupsTitle">
    <article class="fh-backups-surface">
      <header class="fh-backups-header">
        <h3 id="backupsTitle">Backups</h3>
        <button id="closeBackupsDialogBtn" class="fh-btn fh-btn-ghost" type="button">Fechar</button>
      </header>

      <div class="fh-backups-content">
        <div class="fh-backups-column">
          <h4>Exportar</h4>
          <button id="exportAllBackupBtn" class="fh-btn fh-btn-success" type="button">Backup completo</button>
          <button id="exportPatientsOnlyBackupBtn" class="fh-btn" type="button">Somente pacientes</button>
          <button id="exportAllWithoutPatientsBackupBtn" class="fh-btn fh-btn-ghost" type="button">Sem pacientes</button>
        </div>

        <div class="fh-backups-column">
          <h4>Importar</h4>
          <button id="importAllBackupBtn" class="fh-btn fh-btn-success" type="button">Importar completo</button>
          <button id="importPatientsOnlyBackupBtn" class="fh-btn" type="button">Importar somente pacientes</button>
          <button id="importAllWithoutPatientsBackupBtn" class="fh-btn fh-btn-ghost" type="button">Importar sem pacientes</button>
        </div>
      </div>
    </article>
  </dialog>

  <dialog id="patientConflictDialog" class="fh-conflict-dialog" aria-labelledby="patientConflictTitle">
    <article class="fh-conflict-surface">
      <header class="fh-conflict-header">
        <h3 id="patientConflictTitle">Conflito de paciente detectado</h3>
      </header>

      <div class="fh-conflict-content">
        <p id="patientConflictMessage" class="fh-conflict-message"></p>
        <div id="patientConflictList" class="fh-conflict-list" aria-live="polite"></div>
      </div>

      <footer class="fh-conflict-actions">
        <button id="confirmPatientConflictBtn" class="fh-btn" type="button" hidden>Confirmar</button>
        <button id="autoFillRequiredBtn" class="fh-btn fh-btn-ghost" type="button" hidden>Auto completar</button>
        <button id="useAllNewPatientConflictBtn" class="fh-btn" type="button" hidden>Usar Novo</button>
        <button id="exitPatientConflictBtn" class="fh-btn fh-btn-ghost" type="button">Sair</button>
      </footer>
    </article>
  </dialog>

  <dialog id="procedureSearchDialog" class="fh-procedure-dialog" aria-labelledby="procedureSearchTitle">
    <article class="fh-procedure-surface">
      <header class="fh-procedure-header">
        <div class="fh-procedure-header-copy">
          <h3 id="procedureSearchTitle">Procedimentos registrados</h3>
          <p class="fh-procedure-subtitle">Busque e selecione um procedimento já salvo na Lista de Pacientes.</p>
        </div>

        <button id="closeProcedureSearchBtn" class="fh-btn fh-btn-ghost" type="button">Fechar</button>
      </header>

      <div class="fh-procedure-content">
        <label class="fh-procedure-search" for="procedureSearchInput">
          <span>Pesquisar procedimento</span>
          <input
            id="procedureSearchInput"
            class="fh-procedure-search-input"
            type="search"
            autocomplete="off"
            spellcheck="false"
            placeholder="Digite para filtrar os procedimentos">
        </label>

        <p id="procedureSearchCount" class="fh-procedure-count" aria-live="polite"></p>

        <div id="procedureSearchList" class="fh-procedure-list" aria-live="polite"></div>
        <p id="procedureSearchEmpty" class="fh-procedure-empty" hidden></p>
      </div>
    </article>
  </dialog>

</section>
