<section class="fh-panel-wrap">
  <article class="fh-panel" aria-live="polite">
    <div class="fh-panel-headline">
      <h2>Dados importados</h2>
      <p class="fh-subtitle">Edite diretamente os dados importados neste bloco de notas.</p>
    </div>

    <div class="fh-panel-body">
      <textarea id="importedDataEditor" class="fh-data-editor" spellcheck="false"
        aria-label="Editor dos dados importados" placeholder="Nenhum dado importado ainda."></textarea>
    </div>
  </article>

  <div class="fh-panel-actions">
    <div class="fh-panel-actions-left">
      <button id="clearAllDataBtn" class="fh-btn fh-btn-ghost" type="button" data-hover-description="Remove todos os dados, mantendo a Lista de Pacientes.">Limpar Dados</button>
    </div>

    <div class="fh-panel-actions-right">
      <button id="importBtn" class="fh-btn fh-btn-primary" type="button">Importar dados</button>
      <button id="processBtn" class="fh-btn" type="button">Processar</button>
      <button id="clearDataBtn" class="fh-btn fh-btn-danger" type="button">Limpar</button>
    </div>
    <input id="importFileInput" type="file" accept=".txt,.json" hidden>
  </div>

  <dialog id="patientConflictDialog" class="fh-conflict-dialog" aria-labelledby="patientConflictTitle">
    <article class="fh-conflict-surface">
      <header class="fh-conflict-header">
        <h3 id="patientConflictTitle">Conflito de paciente detectado</h3>
      </header>

      <div class="fh-conflict-content">
        <p id="patientConflictMessage" class="fh-conflict-message"></p>
        <div id="patientConflictList" class="fh-conflict-list" aria-live="polite"></div>
      </div>

      <footer class="fh-conflict-actions">
        <button id="confirmPatientConflictBtn" class="fh-btn" type="button" hidden>Confirmar</button>
        <button id="autoFillRequiredBtn" class="fh-btn fh-btn-ghost" type="button" hidden>Auto completar</button>
        <button id="exitPatientConflictBtn" class="fh-btn fh-btn-ghost" type="button">Sair</button>
      </footer>
    </article>
  </dialog>

</section>
