<section class="fh-registro-board" aria-label="Registro de alterações do paciente">
    <header class="fh-registro-headline">
        <p class="fh-registro-kicker">Histórico compacto</p>
        <h2>Registro</h2>
        <p class="fh-subtitle">Cada linha mostra a data da referência escolhida no painel inicial e a mudança aplicada ao paciente.</p>
    </header>

    <article class="fh-registro-summary">
        <div class="fh-registro-summary-copy">
            <h3 id="patientRecordName">Paciente não encontrado</h3>
            <p id="patientRecordMeta" class="fh-registro-meta">Selecione um paciente na lista para ver o registro de alterações.</p>
        </div>

        <button id="backToPatientsBtn" type="button" class="fh-btn fh-btn-ghost">Voltar para a lista</button>
    </article>

    <div class="fh-registro-history-wrap">
        <ul id="patientRecordHistoryList" class="fh-registro-history-list" aria-label="Lista de alterações do paciente"></ul>
    </div>
</section>
